name: Instagram AI Video

"on":
  workflow_dispatch:
    inputs:
      prompt:
        description: Prompt atau ide video
        required: true
        default: "Buat video motivasi singkat tentang mulai dari langkah kecil."
      mood:
        description: Gaya video
        required: false
        default: "clean"
      duration_seconds:
        description: Durasi video dalam detik
        required: false
        default: "24"
      publish:
        description: Publish ke Instagram: true/false
        required: false
        default: "true"

concurrency:
  group: instagram-ai-video
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  generate:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    env:
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
      APP_TIMEZONE: Asia/Jakarta
      DRY_RUN: "false"
      AUTO_PUBLISH: "true"
      UPLOAD_DRIVER: ${{ secrets.UPLOAD_DRIVER }}
      PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
      REMOTE_UPLOAD_REQUIRED: "true"

      GRAPH_API_VERSION: ${{ secrets.GRAPH_API_VERSION }}
      INSTAGRAM_UPLOAD_ENABLED: "true"
      INSTAGRAM_REEL_UPLOAD_METHOD: ${{ secrets.INSTAGRAM_REEL_UPLOAD_METHOD }}
      INSTAGRAM_IG_USER_ID: ${{ secrets.INSTAGRAM_IG_USER_ID }}
      INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
      INSTAGRAM_CONTAINER_POLL_SECONDS: ${{ secrets.INSTAGRAM_CONTAINER_POLL_SECONDS }}
      INSTAGRAM_CONTAINER_MAX_ATTEMPTS: ${{ secrets.INSTAGRAM_CONTAINER_MAX_ATTEMPTS }}
      INSTAGRAM_VIDEO_URL_CHECK_ATTEMPTS: ${{ secrets.INSTAGRAM_VIDEO_URL_CHECK_ATTEMPTS }}
      INSTAGRAM_VIDEO_URL_CHECK_DELAY_SECONDS: ${{ secrets.INSTAGRAM_VIDEO_URL_CHECK_DELAY_SECONDS }}
      META_APP_ID: ${{ secrets.META_APP_ID }}
      META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
      AUTO_REFRESH_INSTAGRAM_TOKEN: ${{ secrets.AUTO_REFRESH_INSTAGRAM_TOKEN }}
      TOKEN_REFRESH_BEFORE_DAYS: ${{ secrets.TOKEN_REFRESH_BEFORE_DAYS }}

      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      OPENAI_TEMPERATURE: ${{ secrets.OPENAI_TEMPERATURE }}
      AI_REQUEST_TIMEOUT_SECONDS: ${{ secrets.AI_REQUEST_TIMEOUT_SECONDS }}

      SFTP_HOST: ${{ secrets.SFTP_HOST }}
      SFTP_PORT: ${{ secrets.SFTP_PORT }}
      SFTP_USER: ${{ secrets.SFTP_USER }}
      SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
      SFTP_PRIVATE_KEY: ${{ secrets.SFTP_PRIVATE_KEY }}
      SFTP_PASSPHRASE: ${{ secrets.SFTP_PASSPHRASE }}
      SFTP_REMOTE_DIR: ${{ secrets.SFTP_REMOTE_DIR }}
      SFTP_TIMEOUT_SECONDS: ${{ secrets.SFTP_TIMEOUT_SECONDS }}
      SFTP_UPLOAD_TIMEOUT_SECONDS: ${{ secrets.SFTP_UPLOAD_TIMEOUT_SECONDS }}
      SFTP_UPLOAD_RETRIES: ${{ secrets.SFTP_UPLOAD_RETRIES }}
      SFTP_PUBLIC_URL_RETRIES: ${{ secrets.SFTP_PUBLIC_URL_RETRIES }}
      SFTP_PUBLIC_URL_RETRY_DELAY_MS: ${{ secrets.SFTP_PUBLIC_URL_RETRY_DELAY_MS }}

      FTP_HOST: ${{ secrets.FTP_HOST }}
      FTP_PORT: ${{ secrets.FTP_PORT }}
      FTP_USER: ${{ secrets.FTP_USER }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
      FTP_TIMEOUT_SECONDS: ${{ secrets.FTP_TIMEOUT_SECONDS }}
      FTP_UPLOAD_TIMEOUT_SECONDS: ${{ secrets.FTP_UPLOAD_TIMEOUT_SECONDS }}
      FTP_UPLOAD_RETRIES: ${{ secrets.FTP_UPLOAD_RETRIES }}
      FTP_PUBLIC_URL_RETRIES: ${{ secrets.FTP_PUBLIC_URL_RETRIES }}
      FTP_PUBLIC_URL_RETRY_DELAY_MS: ${{ secrets.FTP_PUBLIC_URL_RETRY_DELAY_MS }}

      VIDEO_WIDTH: "1080"
      VIDEO_HEIGHT: "1920"
      VIDEO_FPS: "30"
      VIDEO_RENDER_CRF: ${{ secrets.VIDEO_RENDER_CRF }}
      VIDEO_RENDER_PRESET: ${{ secrets.VIDEO_RENDER_PRESET }}

      FACEBOOK_UPLOAD_ENABLED: "false"
      YOUTUBE_UPLOAD_ENABLED: "false"
      TIKTOK_UPLOAD_ENABLED: "false"
      TIKTOK_UPLOAD_PAUSED: "true"
      THREADS_UPLOAD_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Check FFmpeg
        id: ffmpeg
        shell: bash
        run: |
          if command -v ffmpeg >/dev/null 2>&1 && command -v ffprobe >/dev/null 2>&1; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            ffmpeg -version | head -n 1
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install FFmpeg
        if: steps.ffmpeg.outputs.ready != 'true'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install dependencies
        run: npm ci

      - name: Check configuration
        run: npm run check

      - name: Generate and publish Instagram Reel
        env:
          PROMPT: ${{ github.event.inputs.prompt }}
          MOOD: ${{ github.event.inputs.mood }}
          DURATION_SECONDS: ${{ github.event.inputs.duration_seconds }}
          PUBLISH: ${{ github.event.inputs.publish }}
        shell: bash
        run: |
          args=(--prompt "$PROMPT" --mood "$MOOD" --duration "$DURATION_SECONDS")
          if [ "$PUBLISH" = "true" ] || [ "$PUBLISH" = "1" ]; then
            args+=(--publish)
          fi
          node src/run.js "${args[@]}"
