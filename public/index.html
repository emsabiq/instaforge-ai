<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#111827">
    <title>InstaForge AI</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <section id="authOverlay" class="authOverlay active" aria-hidden="false">
      <form id="authForm" class="loginPanel">
        <div class="brandLine">
          <span class="brandMark">IF</span>
          <div>
            <p>Operator Access</p>
            <h1>InstaForge AI</h1>
          </div>
        </div>
        <label class="field">
          <span>Dashboard PIN</span>
          <input id="authPin" name="pin" type="password" autocomplete="current-password" required>
        </label>
        <button class="btn primary" type="submit">Masuk</button>
        <p id="authError" class="formError" role="alert"></p>
      </form>
    </section>

    <main class="appShell">
      <header class="topBar">
        <div class="brandLine">
          <span class="brandMark">IF</span>
          <div>
            <p>Storyboard AI Video</p>
            <h1>InstaForge AI</h1>
          </div>
        </div>
        <div class="topActions">
          <span id="configLine" class="configLine">Memuat konfigurasi...</span>
          <button id="preflightBtn" class="btn subtle" type="button">Preflight</button>
          <button id="refreshBtn" class="btn subtle" type="button">Refresh</button>
          <button id="logoutBtn" class="btn subtle" type="button">Logout</button>
        </div>
      </header>

      <section id="metricGrid" class="metricGrid"></section>

      <section class="mainGrid">
        <form id="runForm" class="panel composer">
          <div class="panelHead">
            <div>
              <p>Prompt Studio</p>
              <h2>Buat Video Anak</h2>
            </div>
            <span class="badge">15s Test</span>
          </div>

          <label class="field">
            <span>Ide video</span>
            <textarea name="prompt" rows="7" placeholder="Contoh: Nara belajar berbagi buah dengan teman-temannya di taman" required></textarea>
          </label>

          <div class="formGrid">
            <label class="field">
              <span>Gaya</span>
              <select name="mood">
                <option value="educational">Educational</option>
                <option value="warm">Warm</option>
                <option value="adventure">Adventure</option>
                <option value="calm">Calm</option>
                <option value="clean">Clean</option>
              </select>
            </label>
            <label class="field">
              <span>Engine</span>
              <select name="engine">
                <option value="replicate">Replicate LTX</option>
                <option value="ffmpeg">Local FFmpeg</option>
              </select>
            </label>
            <label class="field">
              <span>Audience</span>
              <select name="audience">
                <option value="children">Children</option>
                <option value="general">General</option>
              </select>
            </label>
            <label class="field">
              <span>Format</span>
              <select name="aspect_ratio">
                <option value="16:9">Landscape</option>
                <option value="9:16">Vertical</option>
                <option value="1:1">Square</option>
              </select>
            </label>
            <label class="field">
              <span>Durasi</span>
              <input name="duration_seconds" type="number" min="12" max="60" value="15">
            </label>
            <label class="toggleField">
              <input name="publish" type="checkbox">
              <span>Publish Instagram</span>
            </label>
          </div>

          <button class="btn primary" type="submit">Generate</button>
        </form>

        <section class="panel livePanel">
          <div class="panelHead">
            <div>
              <p>Live Run</p>
              <h2 id="runTitle">Menunggu proses</h2>
            </div>
            <a id="runLink" class="btn subtle" href="#" target="_blank" rel="noreferrer" hidden>Console</a>
          </div>
          <div class="progressLine" aria-hidden="true"><span id="progressBar"></span></div>
          <div class="runDetail">
            <strong id="runStatus">Idle</strong>
            <span id="runDetail">Siap membuat video baru.</span>
            <b id="runProgress">0%</b>
          </div>
          <pre id="consoleOutput">Belum ada output.</pre>
        </section>
      </section>

      <section class="panel">
        <div class="panelHead">
          <div>
            <p>GitHub Actions</p>
            <h2>Recent Runs</h2>
          </div>
          <span id="runCount" class="badge">0 run</span>
        </div>
        <div class="tableWrap">
          <table>
            <thead>
              <tr>
                <th>Status</th>
                <th>Workflow</th>
                <th>Branch</th>
                <th>Waktu</th>
                <th>Link</th>
              </tr>
            </thead>
            <tbody id="runRows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
